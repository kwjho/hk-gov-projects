name: Monthly Data Refresh

on:
  schedule:
    - cron: '0 2 1 * *'   # 02:00 UTC on the 1st of every month
  workflow_dispatch:        # also allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run crawlers
        run: |
          python scripts/crawl_walkability.py
          python scripts/crawl_wsd.py
          python scripts/crawl_cedd.py
          python scripts/crawl_archsd.py
          python scripts/crawl_hyd_road.py
          python scripts/crawl_hyd_noise.py

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "chore: refresh project data $(date -u +%Y-%m-%d)"
          git push
